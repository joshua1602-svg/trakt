# =========================================================================
# MI Agent — Investor / Funder PPTX pack (payload-driven deck definition).
# =========================================================================
#
# This deck is a faithful EXPORT of the React MI dashboard. Every slide renders
# directly from an MI Agent API payload (see mi_agent_pptx/mi_api.py) — the same
# compute functions behind the dashboard's /mi/* endpoints — so every number and
# chart in the pack equals the dashboard for the same portfolio. Nothing is
# recomputed in the deck; slides degrade to a branded placeholder only when the
# dashboard itself would have no data for that panel.
#
# `slides[].type` maps to a handler in mi_agent_pptx/deck.py (_DISPATCH):
#   cover · kpi_summary · strat_barlists · geo · funded_evolution · cohorts ·
#   pipeline_summary · pipeline_evolution · funnel · forecast_bridge ·
#   forecast_projection · forecast_evolution · risk · methodology · appendix

deck:
  name: "Investor & Funder MI Pack"
  theme: trakt_mi_agent_dark
  footer: "trakt MI Agent · Confidential — for institutional funders/investors"
  logo_path: null

slides:
  # 1 --------------------------------------------------------------- Cover
  - id: cover
    type: cover
    title: "Investor & Funder MI Pack"

  # 2 ----------------------------------------------------- Executive Summary
  # Funded KPI tiles (compute_funded_snapshot.kpis) with month-on-month deltas —
  # identical to the dashboard's Funded snapshot header.
  - id: executive_summary
    type: kpi_summary
    title: "Executive Summary"

  # 3 --------------------------------------------- Funded Stratifications I
  - id: stratification_1
    type: strat_barlists
    title: "Funded Stratifications — LTV & Ticket Size"
    keys: [ltv, ticket]

  # 4 -------------------------------------------- Funded Stratifications II
  - id: stratification_2
    type: strat_barlists
    title: "Funded Stratifications — Borrower Age & Type"
    keys: [age, borrower_type]

  # 5 ------------------------------------------- Funded Stratifications III
  - id: stratification_3
    type: strat_barlists
    title: "Funded Stratifications — Broker & Region"
    keys: [broker, region]

  # 6 -------------------------------------- Multi-Dimensional Risk Analytics
  - id: multidim
    type: multidim
    title: "Multi-Dimensional Risk Analytics"

  # 7 --------------------------------------------------- Geographic Exposure
  - id: geography
    type: geo
    title: "Geographic Exposure"

  # 8 ------------------------------------------------- Funded Evolution
  - id: funded_evolution
    type: funded_evolution
    title: "Funded Balance Evolution"

  # 9 ------------------------------------------------------- Vintage Cohorts
  - id: cohorts
    type: cohorts
    title: "Vintage Cohorts"

  # 10 ----------------------------------------------------- Pipeline Overview
  - id: pipeline
    type: pipeline_summary
    title: "Pipeline Overview"

  # 11 ---------------------------------------------------- Pipeline Evolution
  - id: pipeline_evolution
    type: pipeline_evolution
    title: "Pipeline Evolution"

  # 12 --------------------------------------------------- Origination Funnel
  - id: funnel
    type: funnel
    title: "Origination Funnel"

  # 13 ------------------------------------- Origination Flow (KFIs & Completions)
  - id: origination_flow
    type: origination_flow
    title: "Origination Flow — KFIs & Completions"

  # 14 ------------------------------------------------------- Forecast Bridge
  - id: forecast_bridge
    type: forecast_bridge
    title: "Forecast Bridge — Funded to Forecast"

  # 15 --------------------------------------------------- Forecast Projection
  - id: forecast_projection
    type: forecast_projection
    title: "Forecast Projection — Run-Rate Scale-Up"

  # 16 ----------------------------------------------------------- Risk Limits
  - id: risk
    type: risk
    title: "Risk Limits"

  # 17 ------------------------------------------------ Methodology / Notes
  - id: methodology
    type: methodology
    title: "Methodology & Notes"

  # 18 ------------------------------------------------ Appendix / Coverage
  - id: appendix
    type: appendix
    title: "Appendix — Data Coverage"
