# =========================================================================
# MI Agent — Investor / Funder PPTX pack (config-driven deck definition).
# =========================================================================
#
# Single source of truth for the deck: slides, titles, strapline sources, chart
# specs, metric specs, lens applicability and broker suppression. Field bindings
# reference the MI Agent semantic registry keys; bucket keys reference
# config/mi/buckets.yaml; dimensions reference config/mi/stratification_catalogue.yaml.
#
# Every metric and slide declares a LENS (funded | pipeline | forecast). Metrics
# resolve against that lens's frame only, so pipeline totals are never funded
# totals. Missing fields/lenses degrade to branded placeholders + appendix notes.

deck:
  name: "Investor & Funder MI Pack"
  theme: trakt_mi_agent_dark
  default_lens: total
  footer: "trakt MI Agent · Confidential — for institutional funders/investors"
  max_strapline_words: 24
  suppress_broker_consolidated: true
  logo_path: null

# --------------------------------------------------------------------------- #
# Metric registry — semantic field + registry-authorised aggregation + lens.
# --------------------------------------------------------------------------- #
metrics:
  total_pipeline:
    label: "Total Pipeline"
    field: current_outstanding_balance
    aggregation: sum
    lens: pipeline
    format: currency
  funded_balance:
    label: "Funded Balance"
    field: current_outstanding_balance
    aggregation: sum
    lens: funded
    format: currency
  forecast_funded_balance:
    label: "Forecast Funded"
    kind: forecast_funded
    lens: forecast
    format: currency
  loan_count:
    label: "Funded Loans"
    kind: count
    lens: funded
    format: integer
  pipeline_cases:
    label: "Pipeline Cases"
    kind: count
    lens: pipeline
    format: integer
  wa_ticket_size:
    label: "WA Ticket Size"
    field: current_outstanding_balance
    aggregation: avg
    lens: funded
    format: currency
  wa_current_ltv:
    label: "WA Current LTV"
    field: current_loan_to_value
    aggregation: weighted_avg
    lens: funded
    format: percent
  wa_original_ltv:
    label: "WA Original LTV"
    field: original_loan_to_value
    aggregation: weighted_avg
    lens: funded
    format: percent
  wa_borrower_age:
    label: "WA Borrower Age"
    field: youngest_borrower_age
    aggregation: weighted_avg
    weight_field: current_outstanding_balance
    lens: funded
    format: years
  wa_current_rate:
    label: "WA Current Rate"
    field: current_interest_rate
    aggregation: weighted_avg
    weight_field: current_outstanding_balance
    lens: funded
    format: rate
  largest_region:
    label: "Largest Region"
    kind: largest
    dimension: region
    lens: funded
    format: percent
  largest_broker:
    label: "Largest Channel"
    kind: largest
    dimension: broker_channel
    lens: pipeline
    format: percent
  data_quality:
    label: "Data Quality"
    kind: data_quality
    lens: funded
    format: string

# --------------------------------------------------------------------------- #
# Slides (12–15).
# --------------------------------------------------------------------------- #
slides:
  # 1 -------------------------------------------------------------- Cover
  - id: cover
    type: cover
    title: "Investor & Funder MI Pack"
    strapline_source: deterministic

  # 2 ---------------------------------------------------- Executive Summary
  - id: executive_summary
    type: kpi
    title: "Executive Summary"
    strapline_source: llm
    kpis:
      - total_pipeline
      - funded_balance
      - forecast_funded_balance
      - loan_count
      - wa_ticket_size
      - wa_current_ltv
      - wa_current_rate
      - wa_borrower_age
      - largest_region
      - data_quality

  # 3 ----------------------------------------------------- Pipeline Overview
  - id: pipeline_overview
    type: charts
    title: "Pipeline Overview"
    lens: pipeline
    strapline_source: deterministic
    charts:
      - id: pipeline_by_stage
        title: "Pipeline Balance by Stage"
        type: barlist
        dimension: pipeline_stage
        measure: balance
        order: ["KFI", "APPLICATION", "OFFER", "COMPLETED", "WITHDRAWN"]
      - id: pipeline_channel_mix
        title: "Channel Mix (Pipeline)"
        type: barlist
        dimension: broker_channel
        measure: balance
        broker: true
        top_n: 8

  # 4 --------------------------------------------------- Pipeline Conversion
  - id: pipeline_conversion
    type: charts
    title: "Pipeline Conversion"
    lens: pipeline
    strapline_source: deterministic
    charts:
      - id: conversion_by_stage
        title: "Cases by Stage"
        type: barlist
        dimension: pipeline_stage
        measure: count
        order: ["KFI", "APPLICATION", "OFFER", "COMPLETED", "WITHDRAWN"]

  # 5 ------------------------------------------- Pipeline Run-Rate / Forecast
  - id: pipeline_forecast
    type: charts
    title: "Pipeline Run-Rate & Forecast"
    lens: forecast
    strapline_source: deterministic
    charts:
      - id: cumulative_expected_funded
        title: "Cumulative Expected Funded (Weighted)"
        type: area
        date_field: expected_completion_date
        period: M
        measure_field: weighted_expected_funded_amount
        cumulative: true
      - id: monthly_expected_funded
        title: "Expected Funded by Month (Weighted)"
        type: barlist
        dimension: expected_completion_date
        measure_field: weighted_expected_funded_amount
        period: M

  # 6 ------------------------------------------------- Funded Balance Evolution
  - id: funded_evolution
    type: charts
    title: "Funded Balance Evolution"
    lens: funded
    strapline_source: deterministic
    charts:
      - id: funded_balance_over_time
        title: "Funded Balance by Origination Vintage"
        type: area
        date_field: origination_date
        period: M
        measure: balance
        cumulative: true
        mandatory: true
      - id: funded_count_over_time
        title: "Funded Loans by Vintage"
        type: area
        date_field: origination_date
        period: M
        measure: count

  # 7 ----------------------------------------------- Funded Stratifications I
  - id: stratification_1
    type: charts
    title: "Funded Stratifications — LTV & Ticket Size"
    lens: funded
    strapline_source: deterministic
    charts:
      - id: balance_by_ltv
        title: "Balance by LTV Bucket"
        type: barlist
        dimension: current_loan_to_value
        bucket: ltv_bucket
        measure: balance
        mandatory: true
      - id: balance_by_ticket
        title: "Balance by Ticket Size"
        type: barlist
        dimension: current_outstanding_balance
        bucket: balance_band
        measure: balance

  # 8 ---------------------------------------------- Funded Stratifications II
  - id: stratification_2
    type: charts
    title: "Funded Stratifications — Borrower Age & Rate"
    lens: funded
    strapline_source: deterministic
    charts:
      - id: balance_by_age
        title: "Balance by Borrower Age"
        type: barlist
        dimension: youngest_borrower_age
        bucket: borrower_age_bucket
        measure: balance
      - id: balance_by_rate
        title: "Balance by Interest Rate"
        type: barlist
        dimension: current_interest_rate
        bucket: interest_rate_bucket
        measure: balance

  # 9 --------------------------------------------- Funded Stratifications III
  - id: stratification_3
    type: charts
    title: "Funded Stratifications — Region & Origination LTV"
    lens: funded
    strapline_source: deterministic
    charts:
      - id: balance_by_region
        title: "Balance by Region (Top 10)"
        type: barlist
        dimension: region
        measure: balance
        top_n: 10
        mandatory: true
      - id: balance_by_original_ltv
        title: "Balance by Original LTV"
        type: barlist
        dimension: original_loan_to_value
        bucket: original_ltv_bucket
        measure: balance

  # 10 --------------------------------------- Multi-Dimensional Risk Analytics
  - id: risk_analytics
    type: charts
    title: "Multi-Dimensional Risk Analytics"
    lens: funded
    strapline_source: deterministic
    charts:
      - id: heatmap_ltv_age
        title: "Balance Heatmap — LTV × Borrower Age"
        type: heatmap
        dimension: current_loan_to_value
        bucket: ltv_bucket
        dimension2: youngest_borrower_age
        bucket2: borrower_age_bucket
      - id: bubble_ltv_age
        title: "LTV × Age (size = balance)"
        type: bubble
        x: current_loan_to_value
        y: youngest_borrower_age

  # 11 -------------------------------------- Vintage / Origination Analytics
  - id: vintage
    type: charts
    title: "Vintage & Origination Analytics"
    lens: funded
    strapline_source: deterministic
    charts:
      - id: vintage_balance
        title: "Origination Balance by Vintage"
        type: barlist
        dimension: origination_date
        measure: balance
        top_n: 12
      - id: vintage_ltv
        title: "Balance by LTV Bucket"
        type: barlist
        dimension: current_loan_to_value
        bucket: ltv_bucket
        measure: balance

  # 12 ------------------------------------------------- Forecast Bridge
  - id: forecast_snapshot
    type: charts
    title: "Forecast Bridge — Funded to Forecast"
    lens: forecast
    strapline_source: deterministic
    charts:
      - id: forecast_bridge
        title: "Funded + Weighted Pipeline → Forecast Funded"
        type: bridge
      - id: expected_by_stage
        title: "Weighted Expected Funded by Stage"
        type: barlist
        dimension: pipeline_stage
        measure_field: weighted_expected_funded_amount
        order: ["KFI", "APPLICATION", "OFFER", "COMPLETED"]

  # 13 --------------------------------------------------------- Risk Monitor
  - id: risk_monitor
    type: risk_monitor
    title: "Risk Monitor"
    strapline_source: deterministic

  # 14 ------------------------------------------------ Methodology / Notes
  - id: methodology
    type: methodology
    title: "Methodology & Notes"
    strapline_source: deterministic

  # 15 ------------------------------------------------ Appendix / Coverage
  - id: appendix
    type: appendix
    title: "Appendix — Data Coverage"
    strapline_source: deterministic
