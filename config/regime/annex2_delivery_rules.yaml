    default_allowed: true
    default_value: ND1
    validators:
      regex: "^[A-Z0-9_]{1,12}$"
    transform:
      # Allowed enum codes per the authoritative Annex 2 workbook (RREL19).
      enum_map:
        SCRT: SCRT
        SCNF: SCNF
        VRFD: VRFD
        NVRF: NVRF
        SCRG: SCRG
        OTHR: OTHR

  RREL22:
    esma_code: RREL22
    workbook_semantic: SpclSchme/Val
    projected_source_field: special_scheme
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
