regime: ESMA_Annex2
version: 2

reconciliation_scope:
  description: >
    Semantic-alignment pass. Hard-fail enforcement is intentionally limited to
    reconciled Annex 2 codes that are confirmed in workbook/XSD and present in
    current Gate 4 output.
  deferred_fields:
    - RREC22
    - RREC24
    - RREC25
    - RREC26
    - RREC27
    - RREC30
    - RREC31
    - RREC32
    - RREC33
    - RREC34
    - RREC36
    - RREC39

default_policy:
  apply_defaults_only_if_explicit: true
  unknown_values: reject

field_rules:
  RREL1:
    esma_code: RREL1
    workbook_semantic: ScrtstnIdr
    projected_source_field: unique_identifier
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3]
    validators:
      regex: "^[A-Z0-9]{18}[0-9]{2}N\\d{4}\\d{2}$"

  RREL2:
    esma_code: RREL2
    workbook_semantic: OrgnlUndrlygXpsrIdr
    projected_source_field: original_underlying_exposure_identifier
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND5]
    validators:
      regex: "^[A-Za-z0-9._\\-/]{1,64}$"

  RREL6:
    esma_code: RREL6
    workbook_semantic: CutOffDt
    projected_source_field: data_cut_off_date
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND5]
    validators:
      regex: "^\\d{4}-\\d{2}-\\d{2}$"

  RREC9:
    esma_code: RREC9
    workbook_semantic: PrprtyTp/Cd
    projected_source_field: property_type
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND5]
    transform:
      enum_map:
        R1: R1
        R2: R2
        C1: C1
        C2: C2
        OTHR: OTHR

  RREC12:
    esma_code: RREC12
    workbook_semantic: LnToVal/Rate (current valuation)
    projected_source_field: current_loan_to_value
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    precision:
      total_digits: 8
      fraction_digits: 4

  RREC16:
    esma_code: RREC16
    workbook_semantic: LnToVal/Rate (at origination)
    projected_source_field: original_loan_to_value
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    precision:
      total_digits: 8
      fraction_digits: 4

  RREL16:
    esma_code: RREL16
    workbook_semantic: PmryOblgrIncm/IncmVal
    projected_source_field: primary_income
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1

  RREL17:
    esma_code: RREL17
    workbook_semantic: ScndryOblgrIncm/IncmVal
    projected_source_field: secondary_income
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1

  RREL19:
    esma_code: RREL19
    workbook_semantic: PmryOblgrIncm/Vrfctn
    projected_source_field: primary_income_verification
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    validators:
      regex: "^[A-Z0-9_]{1,12}$"

  RREL22:
    esma_code: RREL22
    workbook_semantic: SpclSchme/Val
    projected_source_field: special_scheme
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    transform:
      boolean: xsd_lowercase_true_false

  RREL25:
    esma_code: RREL25
    workbook_semantic: OrgnlTerm/Nb
    projected_source_field: original_term
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    derive:
      type: months_between_dates
      start_field: RREL23
      end_field: RREL24
    default_allowed: true
    default_value: ND1
    validators:
      regex: "^\\d{1,4}$"

  RREL31:
    esma_code: RREL31
    workbook_semantic: PrrPrncplBal/Val/Amt
    projected_source_field: prior_principal_balances
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    derive:
      type: first_non_blank_from_fields
      fields: [prior_principal_balances]
    default_allowed: true
    default_value: ND1
    precision:
      total_digits: 18
      fraction_digits: 2

  RREL32:
    esma_code: RREL32
    workbook_semantic: PrpssUndrlygXpsr/Val/Amt
    projected_source_field: pari_passu_underlying_exposures
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    derive:
      type: first_non_blank_from_fields
      fields: [pari_passu_underlying_exposures]
    default_allowed: true
    default_value: ND1
    precision:
      total_digits: 18
      fraction_digits: 2

  RREL41:
    esma_code: RREL41
    workbook_semantic: BllnAmt/Val/Amt
    projected_source_field: balloon_amount
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    precision:
      total_digits: 18
      fraction_digits: 2

  RREL50:
    esma_code: RREL50
    workbook_semantic: FrstRvsnData/Mrgn/Rate
    projected_source_field: revision_margin_1
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    precision:
      total_digits: 8
      fraction_digits: 4

  RREL51:
    esma_code: RREL51
    workbook_semantic: FrstRvsnData/IntrstRvsnDt/Dt
    projected_source_field: interest_revision_date_1
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    validators:
      regex: "^\\d{4}-\\d{2}-\\d{2}$"

  RREL52:
    esma_code: RREL52
    workbook_semantic: ScndRvsnData/Mrgn/Rate
    projected_source_field: revision_margin_2
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    precision:
      total_digits: 8
      fraction_digits: 4

  RREL53:
    esma_code: RREL53
    workbook_semantic: ScndRvsnData/IntrstRvsnDt/Dt
    projected_source_field: interest_revision_date_2
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    validators:
      regex: "^\\d{4}-\\d{2}-\\d{2}$"
