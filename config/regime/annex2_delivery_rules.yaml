  RREL17:
    esma_code: RREL17
    # workbook_semantic: TBC (ESMA XML path for "Primary Income Type"); prior 'ScndryOblgrIncm/IncmVal' was a mismapping
    projected_source_field: primary_income_type
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    default_allowed: true
    default_value: ND1
    transform:
      # Allowed enum codes per the authoritative Annex 2 workbook (RREL17).
      enum_map:
        GRAN: GRAN
        NITS: NITS
        NITX: NITX
        NTIN: NTIN
        ENIS: ENIS
        EITX: EITX
        EISS: EISS
        DSPL: DSPL
        CORP: CORP
        OTHR: OTHR

  RREL19:
