regime: ESMA_Annex2
version: 2

reconciliation_scope:
  description: >
    Semantic-alignment pass. Hard-fail enforcement is intentionally limited to
    reconciled Annex 2 codes that are confirmed in workbook/XSD and present in
    current Gate 4 output.
  # ACTIVE deferred list — runtime. Every entry must exist in the authoritative
  # workbook universe (config/regime/annex2_field_universe.yaml).
  deferred_fields:
    - RREC22
  # AUDIT-ONLY, NOT loaded at runtime. These codes were previously listed as
  # deferred but do NOT exist in the authoritative Annex 2 workbook universe
  # (phantom). Retained here only as an audit trail; they are excluded from 28a
  # coverage and from runtime deferral. Do not move these back into
  # deferred_fields unless the workbook universe is shown to contain them.
  audit_only_non_universe_fields:
    - RREC24
    - RREC25
    - RREC26
    - RREC27
    - RREC30
    - RREC31
    - RREC32
    - RREC33
    - RREC34
    - RREC36
    - RREC39

default_policy:
  apply_defaults_only_if_explicit: true
  unknown_values: reject

field_rules:
  RREL1:
    esma_code: RREL1
    workbook_semantic: ScrtstnIdr
    projected_source_field: unique_identifier
    mandatory: true
    enforce_presence: true
    # Workbook: ND1-4 NO, ND5 NO — no ND value permitted. Tightened from
    # [ND1, ND2, ND3] which was broader than the authoritative ESMA envelope.
    nd_allowed: []
    validators:
      regex: "^[A-Z0-9]{18}[0-9]{2}N\\d{4}\\d{2}$"

  RREL2:
    esma_code: RREL2
    workbook_semantic: OrgnlUndrlygXpsrIdr
    projected_source_field: original_underlying_exposure_identifier
    mandatory: true
    enforce_presence: true
    # Workbook: ND1-4 NO, ND5 NO — no ND value permitted. Tightened from [ND5].
    nd_allowed: []
    validators:
      regex: "^[A-Za-z0-9._\\-/]{1,64}$"

  RREL6:
    esma_code: RREL6
    workbook_semantic: CutOffDt
    projected_source_field: data_cut_off_date
    mandatory: true
    enforce_presence: true
    # Workbook: ND1-4 NO, ND5 NO — no ND value permitted. Tightened from [ND5].
    nd_allowed: []
    validators:
      regex: "^\\d{4}-\\d{2}-\\d{2}$"

  RREC9:
    esma_code: RREC9
    workbook_semantic: PrprtyTp/Cd
    projected_source_field: property_type
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND5]
    transform:
      enum_map:
        RHOS: RHOS
        RFLT: RFLT
        RBGL: RBGL
        PCMM: PCMM
        BIZZ: BIZZ
        R1: RHOS
        R2: RFLT
        C1: PCMM
        C2: BIZZ
        OTHR: OTHR

  RREL69:
    esma_code: RREL69
    workbook_semantic: AcctSts
    projected_source_field: account_status
    mandatory: false
    enforce_presence: false
    # Workbook: ND1-4 NO, ND5 NO — no ND value permitted. Tightened from [ND5].
    nd_allowed: []
    transform:
      enum_map:
        Active: PERF
        active: PERF
        Redeemed: RDMD
        redeemed: RDMD
        PERF: PERF
        RDMD: RDMD
        OTHR: OTHR

  RREL42:
    esma_code: RREL42
    workbook_semantic: IntrstRateType/Cd
    projected_source_field: interest_rate_type
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        # Plain-English ERM back-book default: a fixed-for-life rate maps to the
        # ESMA "fixed rate for life" code FXRL (resolves the asset-default
        # conflict on interest_rate_type=Fixed without using OTHR).
        Fixed: FXRL
        fixed: FXRL
        FXRL: FXRL
        FLIF: FLIF
        DISC: DISC
        FLCF: FLCF
        FXPR: FXPR
        FINX: FINX
        CAPP: CAPP
        FLFL: FLFL
        FLCA: FLCA
        MODE: MODE
        OBLS: OBLS
        SWIC: SWIC
        OTHR: OTHR

  RREL13:
    esma_code: RREL13
    # workbook_semantic: TBC (ESMA XML path for "Employment Status"); prior 'Prps/Cd' was a mismapping
    projected_source_field: employment_status
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND1, ND2, ND3, ND4]
    transform:
      # Allowed enum codes per the authoritative Annex 2 workbook (RREL13).
      enum_map:
        EMRS: EMRS
        EMBL: EMBL
        EMUK: EMUK
        UNEM: UNEM
        SFEM: SFEM
        NOEM: NOEM
        STNT: STNT
        PNNR: PNNR
        OTHR: OTHR

  RREL27:
    esma_code: RREL27
    workbook_semantic: Prps/Cd
    projected_source_field: purpose
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        PURC: PURC
        IMRT: IMRT
        RMRT: RMRT
        CNST: CNST
        RENV: RENV
        EQRE: EQRE
        DCON: DCON
        BSFN: BSFN
        CMRT: CMRT
        GSPL: GSPL
        RMEQ: RMEQ
        RGBY: RGBY
        OTHR: OTHR

  RREL37:
    esma_code: RREL37
    workbook_semantic: SchdlPrncplPmntFrqnc/Cd
    projected_source_field: scheduled_principal_payment_frequency
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        Monthly: MNTH
        monthly: MNTH
        Quarterly: QUTR
        quarterly: QUTR
        MNTH: MNTH
        QUTR: QUTR

  RREL38:
    esma_code: RREL38
    workbook_semantic: SchdlIntrstPmntFrqnc/Cd
    projected_source_field: scheduled_interest_payment_frequency
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        Monthly: MNTH
        monthly: MNTH
        Quarterly: QUTR
        quarterly: QUTR
        MNTH: MNTH
        QUTR: QUTR

  RREL44:
    esma_code: RREL44
    workbook_semantic: IntrstRateIndx/Cd
    projected_source_field: current_interest_rate_index
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        SONIA: EONS
        sonia: EONS
        EONS: EONS
        OTHR: OTHR

  RREL45:
    esma_code: RREL45
    workbook_semantic: IntrstRateIndxTenor/Cd
    projected_source_field: current_interest_rate_index_tenor
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        1M: MNTH
        3M: QUTR
        6M: SEMI
        12M: YEAR
        MNTH: MNTH
        QUTR: QUTR
        SEMI: SEMI
        YEAR: YEAR
        OTHR: OTHR

  RREL35:
    esma_code: RREL35
    workbook_semantic: AmrtstnType/Cd
    projected_source_field: amortisation_type
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        Interest roll-up: OTHR
        interest roll-up: OTHR
        OTHR: OTHR

  RREC14:
    esma_code: RREC14
    workbook_semantic: CrntVlwtnMthd/Cd
    projected_source_field: current_valuation_method
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        Full survey: FOEI
        full survey: FOEI
        FOEI: FOEI
        OTHR: OTHR

  RREL10:
    esma_code: RREL10
    # workbook_semantic: TBC (ESMA XML path for "Resident"); prior 'Dflt/Fct' was a mismapping
    projected_source_field: resident
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND1, ND2, ND3, ND4]
    transform:
      boolean: xsd_lowercase_true_false

  RREL14:
    esma_code: RREL14
    # workbook_semantic: TBC (ESMA XML path for "Credit Impaired Obligor"); prior 'Ltgtn/Fct' was a mismapping
    projected_source_field: credit_impaired_obligor
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      boolean: xsd_lowercase_true_false

  RREL75:
    esma_code: RREL75
    # workbook_semantic: TBC (ESMA XML path for "Litigation"); prior 'CrdtImprdOblgr/Fct' was a mismapping
    projected_source_field: litigation
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      boolean: xsd_lowercase_true_false

  RREL26:
    esma_code: RREL26
    # workbook_semantic: TBC (ESMA XML path for "Origination Channel"); prior 'DstrbtnChnnl/Cd' was a mismapping
    projected_source_field: origination_channel
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND1, ND2, ND3, ND4, ND5]
    transform:
      # Allowed enum codes per the authoritative Annex 2 workbook (RREL26);
      # source-value synonyms (Direct/IFA/Broker) retained.
      enum_map:
        Direct: DRCT
        direct: DRCT
        IFA: BROK
        Broker: BROK
        broker: BROK
        BRAN: BRAN
        DRCT: DRCT
        BROK: BROK
        WEBI: WEBI
        TPAC: TPAC
        TPTC: TPTC
        OTHR: OTHR

  RREC7:
    esma_code: RREC7
    workbook_semantic: Occupancy/Cd
    projected_source_field: occupancy
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    transform:
      enum_map:
        Owner Occupied: POWN
        owner occupied: POWN
        POWN: POWN
        OTHR: OTHR

  RREL11:
    esma_code: RREL11
    workbook_semantic: GeogrgphclRgnOblgr/Cd
    projected_source_field: geographic_region_obligor
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND1]
    transform:
      geography_map:
        East Midlands: GBZZZ
        East of England: GBZZZ
        London: GBZZZ
        North West: GBZZZ
        Scotland: GBZZZ
        South East: GBZZZ
        South West: GBZZZ
        Wales: GBZZZ
        West Midlands: GBZZZ
        Yorkshire and The Humber: GBZZZ
        GBZZZ: GBZZZ
    # RREL11 = geographic region CODE: GBZZZ (UK ESMA default), a NUTS/ITL code,
    # or an ND code. Reject readable labels / a year.
    validators:
      regex: "^(GBZZZ|ND[0-9]|[A-Z]{2}[A-Z0-9]{1,4})$"

  RREL12:
    esma_code: RREL12
    workbook_semantic: GeogrgphclRgnOblgrYr/Cd
    # RREL12 = the YEAR of the NUTS classification (not a region code). Sourced
    # from geographic_region_classification, which the canonical transform now
    # populates with the configured NUTS classification year (e.g. 2021).
    # Previously sourced from a non-existent field (geographic_region_obligor_year).
    projected_source_field: geographic_region_classification
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND1]
    # Semantic guard: RREL12 is a classification YEAR. Reject region labels
    # ("West Midlands"), NUTS/ITL codes ("TLG31") and region codes ("GBZZZ").
    validators:
      regex: "^(ND[0-9]|(19|20)[0-9]{2})$"
    transform:
      geography_map:
        East Midlands: "2026"
        East of England: "2026"
        London: "2026"
        North West: "2026"
        Scotland: "2026"
        South East: "2026"
        South West: "2026"
        Wales: "2026"
        West Midlands: "2026"
        Yorkshire and The Humber: "2026"

  RREL83:
    esma_code: RREL83
    workbook_semantic: OrgntrId/LEICd
    projected_source_field: originator_legal_entity_identifier
    mandatory: false
    enforce_presence: false
    # Workbook: ND1-4 NO, ND5 NO — no ND value permitted. Tightened from [ND5].
    nd_allowed: []
    transform:
      enum_map:
        213800ABCDE123456701N202501: 213800ABCDE123456701
        213800ABCDE123456701: 213800ABCDE123456701

  RREC12:
    esma_code: RREC12
    workbook_semantic: LnToVal/Rate (current valuation)
    projected_source_field: current_loan_to_value
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
    precision:
      total_digits: 8
      fraction_digits: 4

  RREC16:
    esma_code: RREC16
    workbook_semantic: LnToVal/Rate (at origination)
    projected_source_field: original_loan_to_value
    mandatory: false
    enforce_presence: false
    nd_allowed: [ND5]
