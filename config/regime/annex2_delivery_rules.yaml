    workbook_semantic: OrgnlTerm/Nb
    projected_source_field: original_term
    mandatory: true
    enforce_presence: true
    nd_allowed: [ND1, ND2, ND3, ND4]
    derive:
      type: months_between_dates
      start_field: RREL23
      end_field: RREL24
    default_allowed: true
    default_value: ND1
    validators:
      regex: "^\\d{1,4}$"

  RREL31:
