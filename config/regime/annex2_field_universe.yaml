    nd1_4_allowed: false
    nd5_allowed: true
    format: '{PERCENTAGE}'
  RREL49:
    field_name: Interest Rate Floor
    section: Underlying exposures information section
    content: Minimum rate that the obligor must pay on a floating rate underlying
