      European Central Bank Base Rate (ECBR) \nLender's Own Rate (LDOR)\nOther (OTHR)"
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{LIST}'
  RREL45:
    field_name: Current Interest Rate Index Tenor
