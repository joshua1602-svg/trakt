    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL54:
    field_name: Revision Margin 3
    section: Underlying exposures information section
    content: 'The margin for the underlying exposure at the 3rd revision date. This
      refers only to contractual changes in the margin (e.g. from +50bps to +100bps)
      or the underlying index (e.g. from 3M EUIBOR to 1M EURIBOR) used for the interest
      calculation. This field does not refer to the date that the index is reset periodically
      (e.g. resetting 1M EURIBOR each month). 


      The full revised margin must be entered in this field, not the change in the
      margin.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{PERCENTAGE}'
  RREL55:
    field_name: Interest Revision Date 3
    section: Underlying exposures information section
    content: Date of 3rd interest rate change (e.g. discount margin changes, fixed
      period ends, underlying exposure re-fixed etc. this is not the next LIBOR/EURIBOR/index
      reset date).
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL56:
    field_name: Revised Interest Rate Index
    section: Underlying exposures information section
    content: "Next interest rate index.\n\nMuniAAA (MAAA)\nFutureSWAP (FUSW)\nLIBID\
      \ (LIBI)\nLIBOR (LIBO)\nSWAP (SWAP)\nTreasury (TREA)\nEuribor (EURI)\nPfandbriefe\
      \ (PFAN)\nEONIA (EONA)\nEONIASwaps (EONS)\nEURODOLLAR (EUUS)\nEuroSwiss (EUCH)\n\
      TIBOR (TIBO)\nISDAFIX (ISDA)\nGCFRepo (GCFR)\nSTIBOR (STBO)\nBBSW (BBSW)\nJIBAR\
      \ (JIBA)\nBUBOR (BUBO)\nCDOR (CDOR)\nCIBOR (CIBO)\nMOSPRIM (MOSP)\nNIBOR (NIBO)\n\
      PRIBOR (PRBO)\nTELBOR (TLBO)\nWIBOR (WIBO)\nBank of England Base Rate (BOER)\n\
      European Central Bank Base Rate (ECBR) \nLender's Own Rate (LDOR)\nOther (OTHR)"
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{LIST}'
  RREL57:
    field_name: Revised Interest Rate Index Tenor
    section: Underlying exposures information section
    content: 'Tenor of the next interest rate index:


      Overnight (OVNG)

      IntraDay (INDA)

      1 day (DAIL)

      1 week (WEEK)

      2 week (TOWK)

      1 month (MNTH)

      2 month (TOMN)

      3 month (QUTR)

      4 month (FOMN)

      6 month (SEMI)

      12 month (YEAR)

      On Demand (ONDE)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{LIST}'
  RREL58:
    field_name: Number Of Payments Before Securitisation
    section: Underlying exposures information section
    content: Enter the number of payments made prior to the exposure being transferred
      to the securitisation.
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{INTEGER-9999}'
  RREL59:
    field_name: Percentage Of Prepayments Allowed Per Year
    section: Underlying exposures information section
    content: Percentage amount of pre-payments allowed under the product per year.
      This is for underlying exposures that allow a certain threshold of pre-payments
      (i.e. 10%) before charges are incurred.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{PERCENTAGE}'
  RREL60:
    field_name: Prepayment Lock-Out End Date
    section: Underlying exposures information section
    content: The date after which the lender allows prepayment of the underlying exposure.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL61:
    field_name: Prepayment Fee
    section: Underlying exposures information section
    content: 'Amount collected from the obligor as the fee/penalty due for making
      prepayments as required under the terms of the underlying exposure agreement.
      This is not intended to include any amounts paid as a "break cost" to make up
      interest payments up to the underlying exposure Payment Date. This includes
      amounts collected that have not been securitised.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL62:
    field_name: Prepayment Fee End Date
    section: Underlying exposures information section
    content: The date after which the lender allows prepayment of the underlying exposure
      without requirement for a prepayment fee to be paid.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL63:
    field_name: Prepayment Date
    section: Underlying exposures information section
    content: The latest date on which an unscheduled principal payment was received.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL64:
    field_name: Cumulative Prepayments
    section: Underlying exposures information section
    content: 'Total prepayments collected as at the data cut-off date (prepayments
      defined as unscheduled principal payment) since the underlying exposure origination
      date.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{MONETARY}'
  RREL65:
    field_name: Date Of Restructuring
    section: Underlying exposures information section
    content: 'Enter the date at which the underlying exposure has been restructured.
      Restructuring refers to any changes made to the contractual terms of the underlying
      exposure agreement due to forbearance, including payment holidays, arrears capitalisation,
      change of interest rate basis or margins, fees, penalties, maturity and/or other
      generally-accepted measures of restructuring due to forbearance.


      In the event of multiple dates, all dates must be provided in accordance with
      the XML schema.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL66:
    field_name: Date Last In Arrears
    section: Underlying exposures information section
    content: Date the underlying exposure was last in arrears.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL67:
    field_name: Arrears Balance
    section: Underlying exposures information section
    content: "Current balance of arrears, which is defined as:\n\nTotal payments due\
      \ to date\nPLUS any amounts capitalised \nPLUS any fees applied to the account\n\
      LESS total payments received to date.\n\nIf no arrears then enter 0.\n\nInclude\
      \ the currency in which the amount is denominated, using {CURRENCYCODE_3} format."
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{MONETARY}'
  RREL68:
    field_name: Number Of Days In Arrears
    section: Underlying exposures information section
    content: Number of days this underlying exposure is in arrears (either interest
      or principal and, if different, the higher number of the two) as at the data
      cut-off date.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{INTEGER-9999}'
  RREL69:
    field_name: Account Status
    section: Underlying exposures information section
    content: 'Current status of the underlying exposure that has been securitised:


      Performing (PERF)

      Restructured - No Arrears (RNAR)

      Restructured - Arrears (RARR)

      Defaulted according to Article 178 of Regulation (EU) No 575/2013 (DFLT)

      Not defaulted according to Article 178 of Regulation (EU) No 575/2013 but classified
      as defaulted due to another definition of default being met (NDFT)

      Defaulted both according to Article 178 of Regulation (EU) No 575/2013 and according
      to another definition of default being met (DTCR)

      Defaulted only under another definition of default being met (DADB)

      Arrears (ARRE)

      Repurchased by Seller – Breach of Representations and Warranties (REBR)

      Repurchased by Seller – Defaulted (REDF)

      Repurchased by Seller – Restructured (RERE)

      Repurchased by Seller – Special Servicing (RESS)

      Repurchased by Seller – Other Reason (REOT)

      Redeemed (RDMD)

      Other (OTHR)


      Restructuring refers to any changes made to the contractual terms of the underlying
      exposure agreement due to forbearance, including payment holidays, arrears capitalisation,
      change of interest rate basis or margins, fees, penalties, maturity, and/or
      other generally-accepted measures of restructuring due to forbearance.'
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{LIST}'
  RREL70:
    field_name: Reason for Default or Foreclosure
    section: Underlying exposures information section
    content: 'If the underlying exposure is in default as per Article 178 of Regulation
      (EU) No 575/2013, select the appropriate reason:


      In default because the debtor is unlikely to pay, in accordance with Article
      178 of Regulation (EU) No 575/2013. (UPXX)

      In default because any debt is more than 90/180 days past due, in accordance
      with Article 178 of Regulation (EU) No 575/2013. (PDXX)

      In default both because it is considered that the debtor is unlikely to pay
      and because any debt is more than 90/180 days past due, in accordance with Article
      178 of Regulation (EU) No 575/2013. (UPPD)'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{LIST}'
  RREL71:
    field_name: Default Amount
    section: Underlying exposures information section
    content: 'Total gross default amount before the application of sale proceeds and
      recoveries. If not in default, enter 0.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL72:
    field_name: Default Date
    section: Underlying exposures information section
    content: The date of default.
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL73:
    field_name: Allocated Losses
    section: Underlying exposures information section
    content: 'The allocated losses to date, net of fees, accrued interest etc. after
      application of sale proceeds (excluding prepayment charge if subordinate to
      principal recoveries). Show any gain on sale as a negative number. Should reflect
      most recent situation as at the data cut-off date, i.e. as recoveries are collected
      and the work out process progresses.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL74:
    field_name: Cumulative Recoveries
    section: Underlying exposures information section
    content: 'Total recoveries (regardless of their source) on the (defaulted/charged-off/etc.)
      debt, net of costs. Include all sources of recoveries here, not just proceeds
      from the disposal of any collateral. 


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL75:
    field_name: Litigation
    section: Underlying exposures information section
    content: Flag to indicate litigation proceedings underway (if account has recovered
      and is no longer being actively litigated this is to be re-set to N).
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{Y/N}'
  RREL76:
    field_name: Recourse
    section: Underlying exposures information section
    content: Is there recourse (full or limited) to the obligor's assets beyond the
      proceeds of any collateral for this underlying exposure?
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{Y/N}'
  RREL77:
    field_name: Deposit Amount
    section: Underlying exposures information section
    content: 'The sum of all obligor amounts held by the originator or seller that
      are potentially off-settable against the underlying exposure balance, excluding
      the benefit of any national deposit compensation scheme. To prevent double-counting,
      this is to be capped at the lower of (1) the deposit amount, and (2) the maximum
      potential off-settable amount at the obligor-level (i.e. not underlying exposure-level)
      within the pool.

      Use the same currency denomination as that used for this underlying exposure.

      If an obligor has more than one underlying exposure outstanding in the pool,
      then this field is to be completed for each underlying exposure, and it is up
      to the discretion of the reporting entity to decide to allocate the deposit
      amount across each of the underlying exposure, subject to the above-mentioned
      cap and so long as the total entries for this field across the multiple underlying
      exposures adds up to the accurate amount. For example, if Obligor A has deposit
      balance of €100, and two underlying exposures outstanding in the pool of: underlying
      exposure 1 €60 and underlying exposure 2 €75. This field could be completed
      as either underlying exposure 1 - €60 and underlying exposure 2 - €40, or underlying
      exposure 1 - €25 and underlying exposure 2 €75 (i.e. the relative entries for
      this field in each underlying exposure is capped at €60 for underlying exposure
      1 and at €75 for underlying exposure 2 and the sum of the values across underlying
      exposure 1 and underlying exposure 2 must equal €100).


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL78:
    field_name: Insurance Or Investment Provider
    section: Underlying exposures information section
    content: Name of the insurance or investment provider (i.e. for life insurance
      or investment underlying exposures).
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{ALPHANUM-1000}'
  RREL79:
    field_name: Original Lender Name
    section: Underlying exposures information section
    content: Give the full legal name of the original lender. The name entered must
      match the name associated with the LEI in the Global Legal Entity Foundation
      (GLEIF) database.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{ALPHANUM-100}'
  RREL80:
    field_name: Original Lender Legal Entity Identifier
    section: Underlying exposures information section
    content: 'Provide the Legal Entity Identifier (as specified in the Global Legal
      Entity Foundation (GLEIF) database) of the original lender.


      Where no Legal Entity Identifier is available, enter ND5.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{LEI}'
  RREL81:
    field_name: Original Lender Establishment Country
    section: Underlying exposures information section
    content: Country where the original lender is established.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{COUNTRYCODE_2}'
  RREL82:
    field_name: Originator Name
    section: Underlying exposures information section
    content: Give the full legal name of the underlying exposure originator. The name
      entered must match the name associated with the LEI in the Global Legal Entity
      Foundation (GLEIF) database.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{ALPHANUM-100}'
  RREL83:
    field_name: Originator Legal Entity Identifier
    section: Underlying exposures information section
    content: Provide the Legal Entity Identifier (as specified in the Global Legal
      Entity Foundation (GLEIF) database) of the underlying exposure originator.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{LEI}'
  RREL84:
    field_name: Originator Establishment Country
    section: Underlying exposures information section
    content: Country where the underlying exposure originator is established.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{COUNTRYCODE_2}'
  RREC1:
    field_name: Unique Identifier
    section: Collateral information section
    content: Report the same unique identifier here as the one entered into field
      RREL1.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{ALPHANUM-28}'
  RREC2:
    field_name: Underlying Exposure Identifier
    section: Collateral information section
    content: Unique identifier for each underlying exposure. This must match field
      RREL3.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{ALPHANUM-1000}'
  RREC3:
    field_name: Original Collateral Identifier
    section: Collateral information section
    content: The original unique identifier assigned to the collateral. The identifier
      must be different from any external identification number, in order to ensure
      anonymity of the obligor. The reporting entity must not amend this unique identifier.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{ALPHANUM-1000}'
  RREC4:
    field_name: New Collateral Identifier
    section: Collateral information section
    content: If the original identifier in field RREC2 cannot be maintained in this
      field enter the new identifier here. The identifier must be different from any
      external identification number, in order to ensure anonymity of the obligor.
      If there has been no change in the identifier, enter the same identifier as
      in RREC2. The reporting entity must not amend this unique identifier.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{ALPHANUM-1000}'
  RREC5:
    field_name: Collateral Type
    section: Collateral information section
    content: 'The primary (in terms of value) type of asset securing the debt. Where
      there is a guarantee backed by physical or financial collateral, look through
      the guarantee to any collateral that may be supporting that guarantee.


      Automobile (CARX)

      Industrial Vehicle (INDV)

      Commercial Truck (CMTR)

      Rail Vehicle (RALV)

      Nautical Commercial Vehicle (NACM)

      Nautical Leisure Vehicle (NALV)

      Aeroplane (AERO)

      Machine Tool (MCHT)

      Industrial Equipment (INDE)

      Office Equipment (OFEQ)

      IT Equipment (ITEQ)

      Medical Equipment (MDEQ)

      Energy Related Equipment (ENEQ)

      Commercial Building (CBLD)

      Residential Building (RBLD)

      Industrial Building (IBLD)

      Other Vehicle (OTHV)

      Other Equipment (OTHE)

      Other Real Estate (OTRE)

      Other goods or inventory (OTGI)

      Securities (SECU)

      Guarantee (GUAR)

      Other Financial Asset (OTFA)

      Mixed Categories Due to Security Over All Assets of the Obligor (MIXD)

      Other (OTHR)'
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{LIST}'
  RREC6:
    field_name: Geographic Region - Collateral
    section: Collateral information section
    content: The geographic region (NUTS3 classification) where the physical collateral
      is located. Where no NUTS3 classification has been produced by Eurostat (e.g.
      a non-EU jurisdiction), enter the two-digit country code in {COUNTRYCODE_2}
      format followed by 'ZZZ'.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{NUTS}'
  RREC7:
    field_name: Occupancy Type
    section: Collateral information section
    content: 'Type of property occupancy:


      Owner Occupied i.e. owned by a private household with the purpose of providing
      shelter to its owner (FOWN)

      Partially Owner Occupied (A property which is partly rented) (POWN)

      Non-Owner Occupied or Buy-To-Let (TLET)

      Holiday or Second Home (HOLD)

      Other (OTHR)


      If the collateral being reported is not property collateral, enter ND5.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{LIST}'
  RREC8:
    field_name: Lien
    section: Collateral information section
    content: 'Highest lien position held by the originator in relation to the collateral.


      If the collateral being reported is not property collateral, enter ND5.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{INTEGER-9999}'
  RREC9:
    field_name: Property Type
    section: Collateral information section
    content: 'Property type:


      Residential (House, detached or semi-detached) (RHOS)

      Residential (Flat or Apartment) (RFLT)

      Residential (Bungalow) (RBGL)

      Residential (Terraced House) (RTHS)

      Multifamily House (properties with more than four units securing one underlying
      exposure) (MULF)

      Partial Commercial use (property is used as a residence as well as for commercial
      use where less than 50% of its value derived from commercial use, e.g. doctor’s
      surgery and house) (PCMM)

      Commercial or Business Use (BIZZ)

      Land Only (LAND)

      Other (OTHR)


      If the collateral being reported is not property collateral, enter ND5.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{LIST}'
  RREC10:
    field_name: Energy Performance Certificate Value
    section: Collateral information section
    content: 'The energy performance certificate value of the collateral at the time
      of origination:


      A (EPCA)

      B (EPCB)

      C (EPCC)

      D (EPCD)

      E (EPCE)

      F (EPCF)

      G (EPCG)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{LIST}'
  RREC11:
    field_name: Energy Performance Certificate Provider Name
    section: Collateral information section
    content: Enter the full legal name of the energy performance certificate provider.
      The name entered must match the name associated with the LEI in the Global Legal
      Entity Foundation (GLEIF) database.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{ALPHANUM-100}'
  RREC12:
    field_name: Current Loan-To-Value
    section: Collateral information section
    content: "Current loan to Value ratio (LTV). For non-first lien loans this is\
      \ the combined or total LTV. Where the current loan balance is negative, enter\
      \ 0. \n\nIf the collateral being reported is not property collateral, enter\
      \ ND5."
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{PERCENTAGE}'
  RREC13:
    field_name: Current Valuation Amount
    section: Collateral information section
    content: 'The most recent valuation of the collateral as assessed by an independent
      external or internal appraiser. If such assessment is not available, the current
      value of the collateral can be estimated using a real estate value index sufficiently
      granular with respect to geographical location and type of collateral; if such
      real estate value index is also not available, a real estate price index sufficiently
      granular with respect to geographical location and type of collateral can be
      used after application of a suitably chosen mark-down to account for the depreciation
      of the collateral.


      If the collateral being reported is not property collateral, enter the most
      recent valuation of the collateral as assessed by an independent external or
      internal appraiser or, if not available, by the originator.


      If the collateral being reported is a guarantee, enter the amount of underlying
      exposure guaranteed by this collateral item to the benefit of the originator.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{MONETARY}'
  RREC14:
    field_name: Current Valuation Method
    section: Collateral information section
    content: 'The method of calculating the most recent value of the collateral, as
      provided in RREC13:


      Full, internal and external inspection (FIEI)

      Full, only external inspection (FOEI)

      Drive-by (DRVB)

      Automated Value Model (AUVM)

      Indexed (IDXD)

      Desktop (DKTP)

      Managing Agent or Estate Agent (MAEA)

      Tax Authority (TXAT)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{LIST}'
  RREC15:
    field_name: Current Valuation Date
    section: Collateral information section
    content: The date of the most recent valuation, as provided in RREC13.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREC16:
    field_name: Original Loan-To-Value
    section: Collateral information section
    content: 'Originator’s original underwritten loan To Value ratio (LTV). For non-first
      lien loans this is the combined or total LTV.


      If the collateral being reported is not property collateral, enter ND5.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{PERCENTAGE}'
  RREC17:
    field_name: Original Valuation Amount
    section: Collateral information section
    content: "The original valuation of the collateral used when the underlying exposure\
      \ was originated (i.e. before securitisation). \n\nInclude the currency in which\
      \ the amount is denominated, using {CURRENCYCODE_3} format."
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{MONETARY}'
  RREC18:
    field_name: Original Valuation Method
    section: Collateral information section
    content: 'The method of calculating the value of the collateral at the time of
      underlying exposure origination, as provided in RREC17:


      Full, internal and external inspection (FIEI)

      Full, only external inspection (FOEI)

      Drive-by (DRVB)

      Automated Valuation Model (AUVM)

      Indexed (IDXD)

      Desktop (DKTP)

      Managing Agent / Estate Agent (MAEA)

      Tax Authority (TXAT)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{LIST}'
  RREC19:
    field_name: Original Valuation Date
    section: Collateral information section
    content: The date of original valuation of the collateral, as provided in RREC17.
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{DATEFORMAT}'
  RREC20:
    field_name: Date Of Sale
    section: Collateral information section
    content: The date of sale of the foreclosed collateral.
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREC21:
    field_name: Sale Price
    section: Collateral information section
    content: 'Price achieved on sale of collateral in case of foreclosure.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREC22:
    field_name: Collateral Currency
    section: Collateral information section
    content: This is the currency in which the valuation amount provided in RREC13
      is denominated.
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{CURRENCYCODE_3}'
  RREC23:
    field_name: Guarantor Type
    section: Collateral information section
    content: 'Guarantor Type:


      No Guarantor (NGUA)

      Individual - Family Relation (FAML)

      Individual - Other (IOTH)

      Government (GOVE)

      Bank (BANK)

      Insurance Product (INSU)

      Nationale Hypotheek Garantie Guarantee Scheme (NHGX)

      Fonds de Garantie de l''Accession Sociale (FGAS)

      Caution (CATN)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{LIST}'
