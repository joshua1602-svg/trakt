  RREL29:
    field_name: Original Principal Balance
    section: Underlying exposures information section
    content: "Original underlying exposure balance (inclusive of fees). \nThis is\
      \ referring to the balance of the underlying exposure at the underlying exposure\
      \ origination date, not the date of the underlying exposure’s sale to the SSPE\
      \ or the closing date of the securitisation.\n\nInclude the currency in which\
      \ the amount is denominated, using {CURRENCYCODE_3} format."
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{MONETARY}'
  RREL30:
    field_name: Current Principal Balance
    section: Underlying exposures information section
    content: 'Amount of underlying exposure outstanding as of the data cut-off date.
      This includes any amounts that are secured by the mortgage and will be classed
      as principal in the securitisation. For example, if fees have been added to
      the underlying exposure balance and are part of the principal in the securitisation
      these are to be added. It excludes any interest arrears or penalty amounts.

      Current balance includes the principal arrears. However, savings amount is to
      be deducted if a subparticipation exists. (i.e. underlying exposure balance
      = underlying exposure +/- subparticipation; +/- 0 if no subparticipation).


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL31:
    field_name: Prior Principal Balances
    section: Underlying exposures information section
    content: 'Total balances ranking prior to this underlying exposure (including
      those held with other lenders). If there are no prior balances, enter 0. 


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{MONETARY}'
  RREL32:
    field_name: Pari Passu Underlying Exposures
    section: Underlying exposures information section
    content: 'Total value of underlying exposures to this obligor ranking pari passu
      with this underlying exposure (regardless of whether or not they are included
      in this pool). If there are no balances ranking pari passu, enter 0. 


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{MONETARY}'
  RREL33:
    field_name: Total Credit Limit
    section: Underlying exposures information section
    content: 'For underlying exposures with flexible re-draw facilities (including
      revolving characteristics) or where the maximum underlying exposure amount hasn’t
      been withdrawn in full – the maximum underlying exposure amount that could potentially
      be outstanding.

      This field is only to be populated for underlying exposures that have flexible
      or further drawing characteristics. 

      This is not intended to capture instances where the obligor may renegotiate
      an increased underlying exposure balance but rather where there is currently
      the contractual ability for the obligor to do this and for the lender to provide
      the additional funding.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL34:
    field_name: Purchase Price
    section: Underlying exposures information section
    content: Enter the price, relative to par, at which the underlying exposure was
      purchased by the SSPE. Enter 100 if no discounting was applied.
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{PERCENTAGE}'
  RREL35:
    field_name: Amortisation Type
    section: Underlying exposures information section
    content: 'Type of amortisation of the underlying exposure including principal
      and interest.


      French - i.e. Amortisation in which the total amount — principal plus interest
      — repaid in each instalment is the same. (FRXX)

      German - i.e. Amortisation in which the first instalment is interest-only and
      the remaining instalments are constant, including capital amortisation and interest.
      (DEXX)

      Fixed amortisation schedule - i.e. Amortisation in which the principal amount
      repaid in each instalment is the same. (FIXE)

      Bullet - i.e. Amortisation in which the full principal amount is repaid in the
      last instalment. (BLLT)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{LIST}'
  RREL36:
    field_name: Principal Grace Period End Date
    section: Underlying exposures information section
    content: If applicable as at the data cut-off date, indicate the principal grace
