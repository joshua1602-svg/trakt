    nd1_4_allowed: true
    nd5_allowed: false
    format: '{Y/N}'
  RREL11:
    field_name: Geographic Region - Obligor
    section: Underlying exposures information section
    content: The geographic region (NUTS3 classification) where the obligor is located.
      Where no NUTS3 classification has been produced by Eurostat (e.g. a non-EU jurisdiction),
      enter the two-digit country code in {COUNTRYCODE_2} format followed by 'ZZZ'.
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{NUTS}'
  RREL12:
    field_name: Geographic Region Classification
    section: Underlying exposures information section
    content: Enter the year of the NUTS3 classification used for the Geographic Region
      fields, e.g. 2013 for NUTS3 2013. All geographic region fields must use the
      same classification consistently for each underlying exposure and across all
      underlying exposures in the data submission. For example, reporting using NUTS3
      2006 for some geographic fields relating to a given underlying exposure and
      reporting using NUTS3 2013 for other fields relating to the same exposure is
      not allowed. In the same way, reporting geographic region fields using NUTS3
      2006 for some underlying exposures and reporting geographic region fields using
      NUTS3 2013 for other underlying exposures in the same data submission is not
      allowed.
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{YEAR}'
  RREL13:
    field_name: Employment Status
    section: Underlying exposures information section
    content: 'Employment status of the primary obligor:


      Employed - Private Sector (EMRS)

      Employed - Public Sector (EMBL)

      Employed - Sector Unknown (EMUK)

      Unemployed (UNEM)

      Self-employed (SFEM)

      No Employment, Obligor is Legal Entity (NOEM)

      Student (STNT)

      Pensioner (PNNR)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{LIST}'
  RREL14:
    field_name: Credit Impaired Obligor
    section: Underlying exposures information section
    content: "Confirm that, pursuant to Article 20(11) of Regulation (EU) 2017/2402,\
      \ at the time that this underlying exposure was selected for transfer to the\
      \ SSPE, the exposure was neither in default within the meaning of Article 178(1)\
      \ of Regulation (EU) No 575/2013 nor constituted an exposure to a credit-impaired\
      \ debtor or guarantor, who, to the best of the originator’s or original lender’s\
      \ knowledge:\n(a) has been declared insolvent or had a court grant his creditors\
      \ a final non-appealable right of enforcement or material damages as a result\
      \ of a missed payment within three years prior to the date of origination or\
      \ has undergone a debt restructuring process with regard to his non-performing\
      \ exposures within three years prior to the date of transfer or assignment of\
      \ the underlying exposures to the SSPE, except if:\n (i) a restructured underlying\
      \ exposure has not presented new arrears since the date of the restructuring,\
      \ which must have taken place at least one year prior to the date of transfer\
      \ or assignment of the underlying exposures to the SSPE; and\n (ii) the information\
      \ provided by the originator, sponsor and SSPE in accordance with points (a)\
      \ and (e)(i) of the first subparagraph of Article 7(1) explicitly sets out the\
      \ proportion of restructured underlying exposures, the time and details of the\
      \ restructuring as well as their performance since the date of the restructuring;\n\
      (b) was, at the time of origination, where applicable, on a public credit registry\
      \ of persons with adverse credit history or, where there is no such public credit\
      \ registry, another credit registry that is available to the originator or original\
      \ lender; or\n(c) has a credit assessment or a credit score indicating that\
      \ the risk of contractually agreed payments not being made is significantly\
      \ higher than for comparable exposures held by the originator which are not\
      \ securitised.\n\nRestructuring refers to any changes made to the contractual\
      \ terms of the underlying exposure agreement due to forbearance, including payment\
      \ holidays, arrears capitalisation, change of interest rate basis or margins,\
      \ fees, penalties, maturity and/or other generally-accepted measures of restructuring\
      \ due to forbearance."
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{Y/N}'
  RREL15:
    field_name: Customer Type
    section: Underlying exposures information section
    content: 'Customer type at origination:


      New customer and not an employee/affiliated with the originator''s group (CNEO)

      New customer and an employee/affiliated with the originator''s group (CEMO)

      New customer and employee/affiliation not recorded (CNRO)

      Existing customer and not an employee/affiliated with the originator''s group
