      Existing customer and an employee/affiliated with the originator''s group (EEMO)

      Existing customer and employee/affiliation not recorded (ENRO)

      Other (OTHR)'
    nd1_4_allowed: true
    nd5_allowed: false
    format: '{LIST}'
  RREL16:
