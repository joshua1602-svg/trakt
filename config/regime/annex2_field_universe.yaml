      enter the same identifier as in RREL2. The reporting entity must not amend this
      unique identifier.
    nd1_4_allowed: false
    nd5_allowed: false
    format: '{ALPHANUM-1000}'
  RREL4:
    field_name: Original Obligor Identifier
    section: Underlying exposures information section
