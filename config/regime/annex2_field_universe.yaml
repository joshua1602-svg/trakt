  RREL7:
    field_name: Pool Addition Date
    section: Underlying exposures information section
    content: 'The date that the underlying exposure was transferred to the SSPE. For
      all underlying exposures in the pool as at the cut-off date in the first report
      submitted to the securitisation repository, if this information is not available
      enter the later of: (i) the closing date of the securitisation, and (ii) the
      origination date of the underlying exposure.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL8:
