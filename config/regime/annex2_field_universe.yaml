    nd1_4_allowed: false
    nd5_allowed: true
    format: '{DATEFORMAT}'
  RREL37:
    field_name: Scheduled Principal Payment Frequency
    section: Underlying exposures information section
    content: 'Frequency of principal payments due, i.e. period between payments:


      Monthly (MNTH)

      Quarterly (QUTR)

      Semi Annual (SEMI)

      Annual (YEAR)

      Other (OTHR)'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{LIST}'
  RREL38:
    field_name: Scheduled Interest Payment Frequency
    section: Underlying exposures information section
    content: 'Frequency of interest payments due, i.e. period between payments:


      Monthly (MNTH)

      Quarterly (QUTR)

      Semi Annual (SEMI)

      Annual (YEAR)

      Other (OTHR)'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{LIST}'
  RREL39:
    field_name: Payment Due
    section: Underlying exposures information section
    content: 'This is the next contractual payment due by the obligor according to
      the payment frequency of the underlying exposure.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{MONETARY}'
  RREL40:
    field_name: Debt To Income Ratio
    section: Underlying exposures information section
    content: 'Debt defined as the amount of underlying exposure outstanding as of
      data cut-off date, this includes any amounts that are secured by the mortgage
      and will be classed as principal in the securitisation. For example if fees
      have been added to the underlying exposure balance and are part of the principal
      in the securitisation these are to be added. Excluding any interest arrears
      or penalty amounts.

      Income defined as combined income, sum of primary and secondary income fields
      (field numbers RREL16 and RREL20) and any other income.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{PERCENTAGE}'
  RREL41:
    field_name: Balloon Amount
    section: Underlying exposures information section
    content: 'Total amount of (securitised) principal repayment to be paid at the
      maturity date of the underlying exposure.


      Include the currency in which the amount is denominated, using {CURRENCYCODE_3}
      format.'
    nd1_4_allowed: true
    nd5_allowed: true
    format: '{MONETARY}'
  RREL42:
    field_name: Interest Rate Type
    section: Underlying exposures information section
    content: 'Interest rate type:


      Floating rate underlying exposure (for life) (FLIF)

      Floating rate underlying exposure linked to one index that will revert to another
      index in the future (FINX)

      Fixed rate underlying exposure (for life) (FXRL)

      Fixed with future periodic resets (FXPR)

      Fixed rate underlying exposure with compulsory future switch to floating (FLCF)

      Floating rate underlying exposure with floor (FLFL)

      Floating rate underlying exposure with cap (CAPP)

      Floating rate underlying exposure with both floor and cap (FLCA)

      Discount (DISC)

      Switch Optionality (SWIC)

      Obligor Swapped (OBLS)

      Modular (MODE)

      Other (OTHR)'
    nd1_4_allowed: false
    nd5_allowed: true
    format: '{LIST}'
