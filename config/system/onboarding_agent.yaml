# config/system/onboarding_agent.yaml
# Configuration for Onboarding Agent v1

# Confidence thresholds for field mapping
confidence_threshold_auto: 0.92    # >= this → auto-accepted, no review
confidence_threshold_review: 0.75  # < this → flagged for review / sent to LLM

llm:
  provider: anthropic

  # Cheap model for question wording, narrative summary, and mapping suggestions
  # Default: Haiku — low cost, fast, sufficient for structured suggestions
  questionnaire_model: claude-haiku-4-5-20251001
  mapping_model: claude-haiku-4-5-20251001

  # Stronger model — only used if allow_frontier_escalation: true AND
  # confidence is still insufficient after cheap model pass
  escalation_model: claude-sonnet-4-6

  # IMPORTANT: Off by default. Enable only where explicitly approved.
  # Frontier escalation significantly increases cost and latency.
  allow_frontier_escalation: false

# Data protection — never relaxed
never_send_full_tape: true
max_sample_values_per_field: 5
max_fields_sent_to_llm: 20

# Question categories for config bootstrap
question_categories:
  - client_config
  - asset_config
  - regime_config
  - schema_definition

# Required config fields by regime
required_config_by_regime:
  ESMA_Annex2:
    - defaults.originator_legal_entity_identifier
    - portfolio.asset_class
    - portfolio.base_currency
    - default_regime
  ESMA_Annex12:
    - defaults.originator_legal_entity_identifier
    - portfolio.asset_class
    - portfolio.base_currency
    - default_regime

# Required config fields by asset class
required_config_by_asset_class:
  equity_release:
    - portfolio.country
    - portfolio.base_currency
  rre:
    - portfolio.country
    - portfolio.base_currency
  sme:
    - portfolio.country
    - portfolio.base_currency

# ---------------------------------------------------------------------------
# Onboarding Agent v2 — geography / classification policy defaults.
# Used by config_suggester to source classification_year (the NUTS/ITL
# classification YEAR for geographic_region_classification / ESMA RREL12).
# This is the VERSION of the geography classification, NOT the reporting date,
# and must never be derived from year(reporting_date).
# ---------------------------------------------------------------------------
geography_policy:
  classification_year: 2021          # NUTS/ITL classification year (RREL12)
  esma_uk_geography_mode: GBZZZ      # RREL11/RREC6 UK delivery mode for ESMA
  mi_region_display_field: collateral_geography  # readable region for MI/FCA

# ---------------------------------------------------------------------------
# Onboarding Agent v2 — document extraction minimisation policy (PART 6).
# Read Word/PDF/markdown/text documents only to extract config-relevant facts.
# NEVER persist full document text, pages, long clauses, signatures, addresses,
# bank details or unrelated boilerplate. Client-specific extractions are scoped
# to the project output directory only (PART 7).
# ---------------------------------------------------------------------------
document_extraction:
  persist_full_text: false
  persist_raw_chunks: false
  client_scoped_only: true
  allowed_retained_evidence_chars: 300
  allowed_extraction_fields:
    warehouse_agreement:
      - warehouse_facility_present
      - warehouse_lender_name
      - warehouse_limit
      - advance_rate
      - margin
      - interest_index
      - maturity_date
      - availability_period
      - eligibility_criteria_summary
      - concentration_limits_summary
      - reporting_frequency
    securitisation_document:
      - securitisation_present
      - target_pool_balance
      - note_classes_summary
      - reporting_regime
      - investor_report_frequency
      - cut_off_date_convention
