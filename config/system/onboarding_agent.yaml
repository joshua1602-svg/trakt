# config/system/onboarding_agent.yaml
# Configuration for Onboarding Agent v1

# Confidence thresholds for field mapping
confidence_threshold_auto: 0.92    # >= this → auto-accepted, no review
confidence_threshold_review: 0.75  # < this → flagged for review / sent to LLM

# ---------------------------------------------------------------------------
# Mapping ambiguity policy (regulatory-preference rule).
# When a source column has multiple plausible canonical targets whose top
# confidence scores are within `ambiguity_delta_threshold`, and one target is
# regulatory while another is non-regulatory, the regulatory-preference rule
# applies (see engine/onboarding_agent/ambiguity_rule.py). The rule is always
# flagged for review and never reintroduces regulatory non-core fields into
# mi_only.
# ---------------------------------------------------------------------------
mapping:
  ambiguity_delta_threshold: 0.10           # top candidates within this delta => ambiguous
  min_ambiguity_candidate_confidence: 0.60  # both competitors must score >= this

# ---------------------------------------------------------------------------
# Low-cost LLM policy for onboarding mapping interpretation (PART 3).
# Off by default. The LLM is a TARGETED, BOUNDED fallback only — deterministic
# matching, aliases, the field registry, file context, data profiling and value
# matching are always tried first. The LLM never writes final mappings/config,
# never sees full data files or full documents, and excess uncertainty is
# converted to user gap questions instead of unbounded token spend.
# ---------------------------------------------------------------------------
llm_policy:
  enabled: false                       # opt-in only (CLI/config)
  provider: anthropic
  model: claude-haiku-4-5-20251001     # cheap default
  zero_cost_first: true                # never call LLM where deterministic is decisive
  max_llm_calls_per_run: 10
  max_items_per_call: 10
  max_total_prompt_chars_per_run: 50000
  max_total_output_tokens_per_run: 4000
  catalogue_mode: compact
  include_sample_values: redacted_only
  max_sample_values_per_field: 3
  repair_attempts: 1
  skip_llm_if:
    deterministic_confidence_above: 0.85
    value_match_rate_above: 0.98
    field_out_of_scope: true
  uncertainty_budget:
    if_unresolved_items_above: 25
    then_do_not_expand_context: true
    create_user_gap_questions_instead: true

# Budget profiles selectable via --llm-budget-profile off|low|standard
llm_budget_profiles:
  off:
    enabled: false
  low:
    enabled: true
    max_llm_calls_per_run: 3
    max_items_per_call: 5
    prioritise_core_blocking_only: true
  standard:
    enabled: true
    max_llm_calls_per_run: 10
    max_items_per_call: 10

llm:
  provider: anthropic

  # Cheap model for question wording, narrative summary, and mapping suggestions
  # Default: Haiku — low cost, fast, sufficient for structured suggestions
  questionnaire_model: claude-haiku-4-5-20251001
  mapping_model: claude-haiku-4-5-20251001

  # Stronger model — only used if allow_frontier_escalation: true AND
  # confidence is still insufficient after cheap model pass
  escalation_model: claude-sonnet-4-6

  # IMPORTANT: Off by default. Enable only where explicitly approved.
  # Frontier escalation significantly increases cost and latency.
  allow_frontier_escalation: false

# Data protection — never relaxed
never_send_full_tape: true
max_sample_values_per_field: 5
max_fields_sent_to_llm: 20

# Question categories for config bootstrap
question_categories:
  - client_config
  - asset_config
  - regime_config
  - schema_definition

# Required config fields by regime
required_config_by_regime:
  ESMA_Annex2:
    - defaults.originator_legal_entity_identifier
    - portfolio.asset_class
    - portfolio.base_currency
    - default_regime
  ESMA_Annex12:
    - defaults.originator_legal_entity_identifier
    - portfolio.asset_class
    - portfolio.base_currency
    - default_regime

# Required config fields by asset class
required_config_by_asset_class:
  equity_release:
    - portfolio.country
    - portfolio.base_currency
  rre:
    - portfolio.country
    - portfolio.base_currency
  sme:
    - portfolio.country
    - portfolio.base_currency

# ---------------------------------------------------------------------------
# Onboarding Agent v2 — geography / classification policy defaults.
# Used by config_suggester to source classification_year (the NUTS/ITL
# classification YEAR for geographic_region_classification / ESMA RREL12).
# This is the VERSION of the geography classification, NOT the reporting date,
# and must never be derived from year(reporting_date).
# ---------------------------------------------------------------------------
geography_policy:
  classification_year: 2021          # NUTS/ITL classification year (RREL12)
  esma_uk_geography_mode: GBZZZ      # RREL11/RREC6 UK delivery mode for ESMA
  mi_region_display_field: collateral_geography  # readable region for MI/FCA

# ---------------------------------------------------------------------------
# Onboarding Agent v2 — document extraction minimisation policy (PART 6).
# Read Word/PDF/markdown/text documents only to extract config-relevant facts.
# NEVER persist full document text, pages, long clauses, signatures, addresses,
# bank details or unrelated boilerplate. Client-specific extractions are scoped
# to the project output directory only (PART 7).
# ---------------------------------------------------------------------------
document_extraction:
  persist_full_text: false
  persist_raw_chunks: false
  client_scoped_only: true
  allowed_retained_evidence_chars: 300
  allowed_extraction_fields:
    warehouse_agreement:
      - warehouse_facility_present
      - warehouse_lender_name
      - warehouse_limit
      - advance_rate
      - margin
      - interest_index
      - maturity_date
      - availability_period
      - eligibility_criteria_summary
      - concentration_limits_summary
      - reporting_frequency
    securitisation_document:
      - securitisation_present
      - target_pool_balance
      - note_classes_summary
      - reporting_regime
      - investor_report_frequency
      - cut_off_date_convention

# ---------------------------------------------------------------------------
# Onboarding Agent Phase 1 — source precedence policy by domain (PART 9).
# These DEFAULTS order candidate sources for a canonical field when no approved
# precedence rule (13_source_precedence_rules.yaml) exists. They are expressed
# as an ordered list of file classifications; the central tape builder ranks
# each field's sources by their file's classification for the field's domain.
#
# Defaults are NEVER treated as final when sources materially conflict — a
# differing value with no APPROVED precedence still becomes a conflict gap and
# is escalated to the user. The defaults only choose a sensible primary when
# values agree or only one source is present.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Source reporting-period eligibility (engine/onboarding_agent/source_period_eligibility.py).
# For monthly MI runs the central lender tape universe must be built from the
# sources that belong to the run's reporting period only — not from every
# loan-like key in the input directory. This gates a cumulative current-book file
# (row-filtered by a Month Run / cut-off column) and excludes future-period
# pipeline/KFI files. Generic + config-driven; never hard-codes a client filename.
# ---------------------------------------------------------------------------
source_period_eligibility:
  enabled: true
  # Roles whose eligible rows DEFINE the lender-tape universe (vs enrichment-only).
  funded_current_book_roles:
    - current_loan_report
    - loan_book
    - servicing_report
    - current_book
    - funded_book
    - warehouse_agreement
  # Roles that must never define the universe (forward-looking / enrichment).
  pipeline_roles:
    - pipeline_report
    - kfi
    - application_pipeline
  # A file dated YYYY-MM-01 may represent the PRIOR month close; set to -1 to
  # shift a filename-derived period back one month (e.g. 2025_11_01 -> October).
  filename_delivery_offset_months: 0
  # Source columns read for an explicit per-row / per-file reporting period. A
  # cumulative current-book file with one of these is ROW-filtered to the run period.
  period_columns:
    - month run
    - month_run
    - cut off date
    - cut_off_date
    - cutoff date
    - reporting month
    - reporting_month
    - reporting period
    - reporting_period
    - report date
    - as at date
    - as_at_date
    - snapshot date
  # Treat unknown-period sources as eligible (permissive). Set false to require an
  # inferred period before a source may contribute rows/values.
  allow_unknown_period: true
  # Per-file explicit period overrides, e.g. {"LoanExtract One - OMNI_test.csv": "2025-11"}.
  overrides: {}

source_precedence:
  defaults_by_domain:
    loan:
      - current_loan_report
      - historical_loan_report
      - warehouse_agreement
      - cashflow_report
    borrower:
      - current_loan_report
      - collateral_report
    collateral:
      - collateral_report
      - current_loan_report
    cashflow:
      - cashflow_report
      - investor_report
    pipeline:
      - pipeline_report
    warehouse_terms:
      - warehouse_agreement
  # Fields whose authoritative balance source is a client decision (loan tape vs
  # cashflow/servicer). Left unranked here so a conflict is surfaced for review.
  balance_fields_require_client_rule:
    - current_principal_balance
