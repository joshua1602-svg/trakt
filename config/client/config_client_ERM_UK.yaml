# config_ERM_UK.yaml
# LAYER 3: MASTER CLIENT CONFIG

client:
  client_id: ere_funding_uk
  display_name: "ERE Funding - Equity Release Mortgages"   # Used for UI/Reports only
  environment: production

portfolio:
  asset_class: equity_release
  country: GB
  base_currency: GBP
  static_reporting_date: "2025-11-30"

# default_regime = client default preference for regulatory output.
default_regime: ESMA_Annex2
# supported_regimes = client capability set.
supported_regimes:
  - ESMA_Annex2
  - ESMA_Annex12
# Legacy field retained for backward compatibility.
regime: ESMA_Annex2

pipeline:
  loan_engine_enabled: false
  mi_enabled: true
  esma_enabled: true


pipeline_persistence:
  enabled: true
  local_output_dir: out_pipeline
  blob_subfolder: pipeline/latest
  write_manifest: true
  upload_to_blob: true
  require_blob_upload: false
  blob_container: outbound
  pipeline_input_path: null
  expected_funding_config_path: config/client/pipeline_expected_funding.yaml

loan_engine:
  day_count_convention: ACT365
  interest_payment_frequency: QUARTERLY
  prepayment_lockout_period_quarters: 2
  legal_maturity_months: 24
  penalty_interest_rate: 0.15
  reporting_date: "2025-11-30"
  ledger_db: "out/loan_ledger.db"
  payments_file: "input/payments.csv"

# --- DEFAULTS (CRITICAL CHANGE) ---
# These are moved here so the Projector injects them into the CSV rows.
defaults:
  originator_legal_entity_identifier: "213800ABCDE123456701N202501"  # RREL83
  originator_name: "ERE Funding Limited"                            # RREL82
  originator_establishment_country: "GB"                            # RREL84

# --- TRANSFORMATIONS (Client Specific) ---
transformations:
  copy_if_missing:
    current_principal_balance: current_outstanding_balance

# --- ENRICHMENT (Client Specific) ---
enrichment:
  enable:
    uk_nuts3: true
  uk_nuts3:
    nuts_csv_path: "reference_data/uk_itl_master_lookup_v2.csv"
    postcode_columns: [postcode, property_postcode]
    target_field: geographic_region_classification
    fill_only_if_blank: true

# --- MI & DISPLAY ---
mi:
  branding:
    app_title: "Portfolio MI Dashboard"
    theme:
      primary_color: "#0B1F3B"
