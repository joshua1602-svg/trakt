# product_defaults_ERM.yaml
# LAYER 2: ASSET CLASS STANDARD
# Universal defaults for UK Equity Release Mortgages.
# These apply to ALL clients unless specifically overridden in Layer 3.

# Asset class key — used to select the asset-specific registry applicability
# layer (e.g. fields_registry maturity_date.applicability.equity_release).
asset_class: equity_release

defaults:
  # --- 1. Core Product Structure ---
  amortisation_type: Bullet           # ERMs roll up; they do not amortise
  repayment_type: Bullet              # Repayment occurs at death/sale
  interest_rate_type: Fixed           # Vast majority of ERM back-books are Fixed
  payment_frequency: ND2              # Borrower makes NO payments
  recourse: N                         # NNEG (No Negative Equity Guarantee) is standard
  loan_seniority: Senior              # Always 1st Lien
  
  # --- 2. Property & Borrower Characteristics ---
  property_occupancy_type: Owner-occupied
  original_valuation_method: FIEI    # Standard full appraial for origination
  
  # --- 3. Currency ---
  exposure_currency_denomination: GBP
  currency_of_financials: GBP

nd_defaults:
# --- 4. Income & Affordability (ND1) ---
  # NEW: Explicitly stating these are not required for ERM underwriting
  employment_status: ND1                  # RREL13
  primary_income: ND1                     # RREL16
  primary_income_type: ND1                # RREL17
  primary_income_currency: ND1            # RREL18
  primary_income_verification: ND1        # RREL19
  secondary_income: ND1                   # RREL20
  secondary_income_verification: ND1      # RREL21
  debt_to_income_ratio: ND5               # RREL40 — DTI not captured for ERM (see reporting_policy.nd_policy)

  # --- 5. The "Not Applicable" Safety Net (ND2) ---
  # These fields exist in ESMA but are irrelevant for ERM
  maturity_date: ND5                         # No fixed term
  scheduled_principal_payment_frequency: ND5 # No payments
  scheduled_interest_payment_frequency: ND5  # No payments
  current_interest_rate_margin: ND5          # Fixed rate, no margin
  interest_rate_reset_interval: ND5          # Fixed rate
  next_interest_rate_reset_date: ND5         # Fixed rate
  
  # --- 5. Data Gaps (ND5) ---
  # Safe defaults for optional fields likely missing from older tapes
  energy_performance_certificate_value: ND5
  syndicated_portion: ND5

# --------------------------------------------------------------------------- #
# ASSET REPORTING POLICY LAYER (consumed by the Onboarding target-field
# disposition / completion checklist). This is the ASSET-specific policy — it is
# NOT generic Annex 2 regime logic and must not be hard-coded into the engine.
# A client/lender policy file (e.g. config/client/client_001_reporting_policy.yaml)
# may override these with the same structure under `reporting_policy:`.
# --------------------------------------------------------------------------- #
reporting_policy:
  # Formal regulatory identifiers that are NOT expected in an ordinary loan tape
  # and must be obtained during formal client onboarding (canonical field names).
  formal_client_onboarding_required:
    - unique_identifier                        # RREL1 ScrtstnIdr
    - original_underlying_exposure_identifier  # RREL2 OrgnlUndrlygXpsrIdr

  # ND/default reporting policy explicitly SELECTED for this asset class. These
  # express "ND selected", not merely "ND allowed". For UK equity release the
  # borrower income / DTI is not captured and is not a relevant metric.
  nd_policy:
    debt_to_income_ratio: ND5                  # RREL40 — DTI not captured for ERM
    maturity_date: ND5                         # RREL24 — lifetime mortgage, no fixed term

  # Fields explicitly not applicable to this asset class (excluded from delivery).
  not_applicable: []

  # ASSET-SPECIFIC ENUM OVERRIDES. These take precedence over the GENERIC Annex 2
  # enum_map in config/regime/annex2_delivery_rules.yaml for THIS asset class only.
  # Keyed by canonical field; each maps a source label -> the ESMA code that this
  # asset class must report. This is a deliberate, documented policy decision —
  # not a global synonym — applied by the Projection Agent as a config-driven
  # override (no enum value is hard-coded in Python).
  #
  # Rationale (amortisation_type): a UK equity release / lifetime mortgage rolls
  # up interest and repays at death/sale. The internal tape labels this "Bullet",
  # but it is NOT a scheduled bullet amortisation under the Annex 2 definition
  # (RREL35 BLLT = "full principal repaid in the LAST instalment" of a schedule).
  # The correct regulatory reporting value for this product is therefore OTHR.
  # Generic (non-ERM) portfolios still map Bullet -> BLLT via the regime enum_map.
  # If product/legal review later confirms a genuine scheduled bullet, change the
  # target here to BLLT (or remove the override).
  enum_overrides:
    amortisation_type:
      Bullet: OTHR
      "Interest roll-up": OTHR