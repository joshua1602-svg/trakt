# =========================================================================
# MI stratification catalogue — dimension -> semantic field -> bucket rule.
# =========================================================================
#
# Phase 0B CONFIG SKELETON — declaration only. Maps each target MI/M&A
# stratification dimension to a semantic field key and a bucket rule, plus the
# states and asset classes it applies to. The stratification engine is NOT
# built in this phase: nothing reads this file yet (build-plan Phase 1).
#
# See:
#   docs/mi_mna_target_architecture_and_build_plan.md   (§3.4)
#   config/mi/buckets.yaml            (bucket edges)
#   mi_agent/mi_semantics_field_registry.yaml  (semantic_field keys)
#
# Each dimension declares:
#   semantic_field : MI semantic registry key
#   bucket         : config/mi/buckets.yaml key, or "categorical" for enums/labels
#   applies_to_states : state-library keys this dimension is valid for
#   asset_classes  : "*" (any) or a list (e.g. equity_release-only dimensions)

version: 0.1.0

dimensions:

  ltv_bucket:
    semantic_field: current_loan_to_value
    bucket: ltv_bucket
    applies_to_states: [total_funded, total_forecast_funded, cohort_by_date]
    asset_classes: "*"

  borrower_age:
    semantic_field: youngest_borrower_age
    bucket: borrower_age_bucket
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  youngest_borrower_age:
    semantic_field: youngest_borrower_age
    bucket: youngest_borrower_age_bucket
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: [equity_release]

  geographic_region:
    semantic_field: geographic_region_obligor
    bucket: categorical
    applies_to_states: [total_funded, total_forecast_funded, cohort_by_date]
    asset_classes: "*"

  interest_rate_bucket:
