    applies_to_states: [total_funded, total_pipeline, cohort_by_date]
    asset_classes: "*"

  amortisation_type:
    semantic_field: amortisation_type
    bucket: categorical
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  origination_channel:
    semantic_field: origination_channel
    bucket: categorical
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  broker_channel:
    semantic_field: broker_channel
    bucket: categorical
    applies_to_states: [total_funded, total_pipeline, cohort_by_date]
    asset_classes: "*"

  internal_risk_stage:
    semantic_field: internal_risk_stage
    bucket: categorical
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  ifrs9_stage:
    semantic_field: ifrs9_stage
    bucket: categorical
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  internal_risk_grade:
    semantic_field: internal_risk_grade
    bucket: categorical
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  pd_bucket:
    semantic_field: probability_of_default
    bucket: pd_bucket
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  lgd_bucket:
    semantic_field: loss_given_default
    bucket: lgd_bucket
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  ead_bucket:
    semantic_field: exposure_at_default
    bucket: ead_bucket
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  interest_rate_type:
    semantic_field: interest_rate_type
    bucket: categorical
    applies_to_states: [total_funded, cohort_by_date]
    asset_classes: "*"

  arrears_status:
    semantic_field: account_status
    bucket: categorical
    applies_to_states: [total_funded, cohort_by_date]
