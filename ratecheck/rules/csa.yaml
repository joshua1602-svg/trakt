# rules/csa.yaml
# Comparable Selection Algorithm (CSA) - filter, normalise, outlier removal, tone derivation

csa:
  filters:
    use_class: "same_or_equivalent"       # same business category; allow near-equivalents when thin
    size_band_pct: 30                      # initial ±30% NIA band
    size_band_pct_fallback: 50            # broaden to ±50% if thin
    distance_m:
      same_parade: 100
      close: 500
      broader: 1000
      fallback: 2000
    avd:
      date: "2024-04-01"
      window_months: 18

  normalisation:
    to_zone_a_equivalent: true
    time_adjustment_to_avd: true
    size_curve_adjustment: true           # small units ↗ tone; large units ↘ tone
    proximity_weighting:
      same_parade: 1.0
      close: 0.7
      broader: 0.5
      fallback: 0.4

  outliers:
    drop_percentiles:
      lower: 0.10
      upper: 0.90
    secondary_policy: "downweight_suspicious"  # downweight if included with flags

  tone:
    statistic: "weighted_median"           # robust against outliers
    fallback_statistic: "iqr_mean"

  confidence:
    high_if_min_comps: 5
    medium_if_min_comps: 3
    low_if_min_comps: 1
